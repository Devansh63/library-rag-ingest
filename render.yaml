# connect the repo to Render and it auto-detects this config.

services:
  - type: web
    name: library-rag
    runtime: python
    region: ohio                    # closest to UIUC
    plan: free                      # free tier (750 hrs/month)

    buildCommand: |
      pip install -r requirements.txt

    startCommand: |
      uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: DATABASE_URL_1
        sync: false                 # you'll set this manually in Render dashboard
      - key: GROQ_API_KEY
        sync: false                  # query classifier + RAG (OpenAI-compatible Groq API)
      - key: PYTHON_VERSION
        value: "3.12.3"
