<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Library — Hybrid RAG Search</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>" />
  <style>
    body { margin: 0; background: #0F1117; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + ReactDOM from CDN -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>

  <!-- Babel standalone to compile JSX in-browser (fine for a course project) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js"></script>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useCallback, useRef } = React;

    // ─── CONFIG ──────────────────────────────────────────────────────────
    // Empty string = same origin (requests go to the FastAPI server hosting this page)
    const API = "";

    // ─── THEME ───────────────────────────────────────────────────────────
    const theme = {
      bg: "#0F1117",
      surface: "#181B25",
      surfaceHover: "#1E2230",
      card: "#1A1D28",
      cardBorder: "#2A2D3A",
      accent: "#C9A95C",
      accentDim: "rgba(201,169,92,0.15)",
      accentGlow: "rgba(201,169,92,0.3)",
      text: "#E8E4DC",
      textMuted: "#8B8A85",
      textDim: "#5A594F",
      danger: "#D4634A",
      success: "#5A9E6F",
      info: "#5B8FBE",
    };

    const font = "'Cormorant Garamond', 'Georgia', serif";
    const fontMono = "'JetBrains Mono', 'Fira Code', monospace";
    const fontSans = "'DM Sans', 'Helvetica Neue', sans-serif";

    // ─── STYLES ──────────────────────────────────────────────────────────
    const styles = {
      app: {
        minHeight: "100vh",
        background: `linear-gradient(180deg, ${theme.bg} 0%, #12141E 100%)`,
        color: theme.text,
        fontFamily: fontSans,
        fontSize: 14,
      },
      header: {
        padding: "28px 40px 20px",
        borderBottom: `1px solid ${theme.cardBorder}`,
        background: `linear-gradient(180deg, rgba(201,169,92,0.04) 0%, transparent 100%)`,
      },
      logo: {
        fontFamily: font,
        fontSize: 28,
        fontWeight: 600,
        color: theme.accent,
        letterSpacing: "0.02em",
        margin: 0,
      },
      subtitle: {
        fontFamily: fontMono,
        fontSize: 11,
        color: theme.textDim,
        letterSpacing: "0.12em",
        textTransform: "uppercase",
        marginTop: 4,
      },
      nav: {
        display: "flex",
        gap: 0,
        marginTop: 20,
        borderBottom: `1px solid ${theme.cardBorder}`,
      },
      navItem: (active) => ({
        padding: "10px 24px",
        fontFamily: fontSans,
        fontSize: 13,
        fontWeight: active ? 600 : 400,
        color: active ? theme.accent : theme.textMuted,
        background: "none",
        border: "none",
        borderBottom: active ? `2px solid ${theme.accent}` : "2px solid transparent",
        cursor: "pointer",
        transition: "all 0.2s",
        letterSpacing: "0.03em",
      }),
      main: {
        maxWidth: 1100,
        margin: "0 auto",
        padding: "32px 40px",
      },
      searchWrap: {
        position: "relative",
        marginBottom: 28,
      },
      searchInput: {
        width: "100%",
        padding: "16px 20px 16px 48px",
        background: theme.surface,
        border: `1px solid ${theme.cardBorder}`,
        borderRadius: 8,
        color: theme.text,
        fontFamily: fontSans,
        fontSize: 15,
        outline: "none",
        boxSizing: "border-box",
        transition: "border-color 0.2s, box-shadow 0.2s",
      },
      searchIcon: {
        position: "absolute",
        left: 18,
        top: "50%",
        transform: "translateY(-50%)",
        color: theme.textDim,
        fontSize: 16,
        pointerEvents: "none",
      },
      card: {
        background: theme.card,
        border: `1px solid ${theme.cardBorder}`,
        borderRadius: 8,
        padding: 20,
        marginBottom: 14,
        transition: "border-color 0.2s, transform 0.15s",
        cursor: "default",
      },
      badge: (color = theme.accent) => ({
        display: "inline-block",
        padding: "3px 10px",
        borderRadius: 4,
        fontSize: 11,
        fontWeight: 600,
        fontFamily: fontMono,
        color: color,
        background: `${color}18`,
        border: `1px solid ${color}30`,
        letterSpacing: "0.04em",
      }),
      btn: (variant = "primary") => ({
        padding: variant === "small" ? "6px 14px" : "10px 22px",
        borderRadius: 6,
        border: variant === "outline" ? `1px solid ${theme.cardBorder}` : "none",
        background: variant === "primary" ? theme.accent : variant === "danger" ? theme.danger : "transparent",
        color: variant === "primary" ? theme.bg : variant === "danger" ? "#fff" : theme.text,
        fontFamily: fontSans,
        fontSize: variant === "small" ? 12 : 13,
        fontWeight: 600,
        cursor: "pointer",
        transition: "all 0.2s",
        letterSpacing: "0.02em",
      }),
      statCard: {
        background: theme.surface,
        border: `1px solid ${theme.cardBorder}`,
        borderRadius: 8,
        padding: "20px 24px",
        flex: 1,
        minWidth: 140,
      },
      statValue: {
        fontFamily: font,
        fontSize: 32,
        fontWeight: 700,
        color: theme.accent,
        lineHeight: 1,
      },
      statLabel: {
        fontSize: 12,
        color: theme.textMuted,
        marginTop: 6,
        fontFamily: fontMono,
        letterSpacing: "0.06em",
        textTransform: "uppercase",
      },
      tag: {
        display: "inline-block",
        padding: "2px 8px",
        borderRadius: 3,
        fontSize: 11,
        color: theme.textMuted,
        background: `${theme.textDim}20`,
        marginRight: 6,
        marginBottom: 4,
      },
      emptyState: {
        textAlign: "center",
        padding: "60px 20px",
        color: theme.textDim,
      },
      emptyIcon: {
        fontSize: 48,
        marginBottom: 16,
        opacity: 0.4,
      },
      inputField: {
        width: "100%",
        padding: "10px 14px",
        background: theme.surface,
        border: `1px solid ${theme.cardBorder}`,
        borderRadius: 6,
        color: theme.text,
        fontFamily: fontSans,
        fontSize: 13,
        outline: "none",
        boxSizing: "border-box",
      },
      label: {
        fontSize: 12,
        color: theme.textMuted,
        fontFamily: fontMono,
        letterSpacing: "0.06em",
        textTransform: "uppercase",
        marginBottom: 6,
        display: "block",
      },
    };

    // ─── HELPERS ─────────────────────────────────────────────────────────
    async function api(path, opts = {}) {
      const url = `${API}${path}`;
      try {
        const res = await fetch(url, {
          headers: { "Content-Type": "application/json" },
          ...opts,
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${res.status}`);
        }
        return await res.json();
      } catch (e) {
        if (e.message.includes("Failed to fetch") || e.message.includes("NetworkError")) {
          throw new Error("Cannot reach the API. Make sure the backend is running.");
        }
        throw e;
      }
    }

    function Stars({ rating, size = 14 }) {
      if (!rating) return React.createElement("span", { style: { color: theme.textDim, fontSize: 12 } }, "No rating");
      const full = Math.floor(rating);
      const partial = rating - full;
      return React.createElement("span", { style: { display: "inline-flex", alignItems: "center", gap: 2 } },
        Array.from({ length: 5 }, (_, i) =>
          React.createElement("span", { key: i, style: { color: i < full ? theme.accent : i === full && partial > 0.3 ? `${theme.accent}88` : theme.textDim, fontSize: size } }, "★")
        ),
        React.createElement("span", { style: { fontSize: 12, color: theme.textMuted, marginLeft: 4, fontFamily: fontMono } }, rating.toFixed(1))
      );
    }

    function Loader({ text = "Loading..." }) {
      return (
        <div style={{ textAlign: "center", padding: 40, color: theme.textMuted }}>
          <div style={{ fontSize: 20, marginBottom: 8, animation: "spin 1s linear infinite" }}>⟳</div>
          <div style={{ fontSize: 13 }}>{text}</div>
        </div>
      );
    }

    function Toast({ message, type = "info", onClose }) {
      const colors = { info: theme.info, success: theme.success, error: theme.danger };
      const c = colors[type] || colors.info;
      useEffect(() => {
        const t = setTimeout(onClose, 4000);
        return () => clearTimeout(t);
      }, [onClose]);
      return (
        <div style={{
          position: "fixed", bottom: 24, right: 24, padding: "12px 20px", borderRadius: 8,
          background: theme.surface, border: `1px solid ${c}40`, color: c,
          fontSize: 13, fontFamily: fontSans, zIndex: 999, boxShadow: `0 4px 20px ${c}20`,
          display: "flex", alignItems: "center", gap: 10, maxWidth: 400,
        }}>
          <span>{type === "success" ? "✓" : type === "error" ? "✕" : "ℹ"}</span>
          <span style={{ flex: 1 }}>{message}</span>
          <button onClick={onClose} style={{ background: "none", border: "none", color: c, cursor: "pointer", fontSize: 16 }}>×</button>
        </div>
      );
    }

    // ─── BOOK CARD ───────────────────────────────────────────────────────
    function BookCard({ book, onSelect }) {
      const [hovered, setHovered] = useState(false);
      return (
        <div
          style={{
            ...styles.card,
            borderColor: hovered ? theme.accent + "50" : theme.cardBorder,
            cursor: "pointer",
            display: "flex",
            gap: 18,
          }}
          onMouseEnter={() => setHovered(true)}
          onMouseLeave={() => setHovered(false)}
          onClick={() => onSelect && onSelect(book)}
        >
          {book.cover_image_url ? (
            <img src={book.cover_image_url} alt=""
              style={{ width: 64, height: 96, objectFit: "cover", borderRadius: 4, flexShrink: 0, background: theme.surface }}
              onError={(e) => { e.target.style.display = "none"; }} />
          ) : (
            <div style={{
              width: 64, height: 96, borderRadius: 4, flexShrink: 0,
              background: `linear-gradient(135deg, ${theme.accentDim}, ${theme.surface})`,
              display: "flex", alignItems: "center", justifyContent: "center",
              fontFamily: font, fontSize: 24, color: theme.accent + "60",
            }}>📖</div>
          )}
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontFamily: font, fontSize: 18, fontWeight: 600, color: theme.text, marginBottom: 4, lineHeight: 1.3 }}>
              {book.title || "Untitled"}
            </div>
            <div style={{ fontSize: 13, color: theme.textMuted, marginBottom: 8 }}>
              {(book.authors || []).join(", ") || "Unknown author"}
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
              <Stars rating={book.goodreads_rating} />
              {book.num_ratings && (
                <span style={{ fontSize: 11, color: theme.textDim, fontFamily: fontMono }}>
                  {book.num_ratings.toLocaleString()} ratings
                </span>
              )}
              {book.rrf_score && (
                <span style={styles.badge(theme.info)}>RRF {book.rrf_score.toFixed(4)}</span>
              )}
            </div>
            {book.genres && book.genres.length > 0 && (
              <div style={{ marginTop: 8 }}>
                {book.genres.slice(0, 5).map((g, i) => (
                  <span key={i} style={styles.tag}>{g}</span>
                ))}
                {book.genres.length > 5 && <span style={styles.tag}>+{book.genres.length - 5}</span>}
              </div>
            )}
            {book.synopsis && (
              <div style={{ fontSize: 12, color: theme.textDim, marginTop: 8, lineHeight: 1.6, maxHeight: 48, overflow: "hidden" }}>
                {book.synopsis.slice(0, 200)}{book.synopsis.length > 200 ? "..." : ""}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── BOOK DETAIL MODAL ──────────────────────────────────────────────
    function BookDetail({ isbn13, onClose, showToast }) {
      const [book, setBook] = useState(null);
      const [reviews, setReviews] = useState([]);
      const [avail, setAvail] = useState(null);
      const [loading, setLoading] = useState(true);
      const [borrowUserId, setBorrowUserId] = useState("");
      const [actionLoading, setActionLoading] = useState(false);

      useEffect(() => {
        if (!isbn13) return;
        setLoading(true);
        Promise.all([
          api(`/books/${isbn13}`).catch(() => null),
          api(`/books/${isbn13}/reviews?limit=10`).catch(() => []),
          api(`/availability/${isbn13}`).catch(() => null),
        ]).then(([b, r, a]) => {
          setBook(b);
          setReviews(r || []);
          setAvail(a);
          setLoading(false);
        });
      }, [isbn13]);

      const handleBorrow = async () => {
        if (!borrowUserId.trim()) return;
        setActionLoading(true);
        try {
          const res = await api("/borrow", { method: "POST", body: JSON.stringify({ isbn13, user_id: borrowUserId.trim() }) });
          showToast(`Borrowed! Due ${res.due_date}`, "success");
          const a = await api(`/availability/${isbn13}`).catch(() => null);
          setAvail(a);
          setBorrowUserId("");
        } catch (e) {
          showToast(e.message, "error");
        }
        setActionLoading(false);
      };

      if (!isbn13) return null;

      return (
        <div style={{
          position: "fixed", inset: 0, zIndex: 100,
          background: "rgba(0,0,0,0.7)", backdropFilter: "blur(6px)",
          display: "flex", justifyContent: "center", alignItems: "flex-start",
          padding: "60px 20px", overflowY: "auto",
        }} onClick={onClose}>
          <div style={{
            background: theme.bg, border: `1px solid ${theme.cardBorder}`,
            borderRadius: 12, maxWidth: 700, width: "100%", padding: 32,
            position: "relative",
          }} onClick={(e) => e.stopPropagation()}>
            <button onClick={onClose} style={{
              position: "absolute", top: 16, right: 16,
              background: "none", border: "none", color: theme.textMuted,
              fontSize: 20, cursor: "pointer",
            }}>×</button>

            {loading ? <Loader text="Loading book details..." /> : !book ? (
              <div style={styles.emptyState}>Book not found</div>
            ) : (
              <React.Fragment>
                <div style={{ display: "flex", gap: 24, marginBottom: 24 }}>
                  {book.cover_image_url ? (
                    <img src={book.cover_image_url} alt="" style={{ width: 120, height: 180, objectFit: "cover", borderRadius: 6, flexShrink: 0 }}
                      onError={(e) => { e.target.style.display = "none"; }} />
                  ) : (
                    <div style={{ width: 120, height: 180, borderRadius: 6, flexShrink: 0, background: `linear-gradient(135deg, ${theme.accentDim}, ${theme.surface})`,
                      display: "flex", alignItems: "center", justifyContent: "center", fontFamily: font, fontSize: 40, color: theme.accent + "40" }}>📖</div>
                  )}
                  <div>
                    <h2 style={{ fontFamily: font, fontSize: 26, fontWeight: 600, margin: "0 0 6px", color: theme.text, lineHeight: 1.2 }}>{book.title}</h2>
                    <p style={{ color: theme.textMuted, fontSize: 14, margin: "0 0 10px" }}>{(book.authors || []).join(", ")}</p>
                    <Stars rating={book.goodreads_rating} size={16} />
                    {book.num_ratings && <span style={{ fontSize: 12, color: theme.textDim, marginLeft: 8, fontFamily: fontMono }}>{book.num_ratings.toLocaleString()} ratings</span>}
                    <div style={{ marginTop: 10, display: "flex", flexWrap: "wrap", gap: 6 }}>
                      {book.publisher && <span style={styles.badge(theme.textMuted)}>{book.publisher}</span>}
                      {book.pages && <span style={styles.badge(theme.textMuted)}>{book.pages} pages</span>}
                      {book.language && <span style={styles.badge(theme.textMuted)}>{book.language}</span>}
                      {book.isbn13 && <span style={styles.badge(theme.textDim)}>ISBN {book.isbn13}</span>}
                    </div>
                  </div>
                </div>

                {book.genres && book.genres.length > 0 && (
                  <div style={{ marginBottom: 16 }}>
                    {book.genres.map((g, i) => <span key={i} style={styles.tag}>{g}</span>)}
                  </div>
                )}

                {(book.synopsis || book.short_description || book.plot_summary) && (
                  <div style={{ marginBottom: 20 }}>
                    <div style={styles.label}>Synopsis</div>
                    <p style={{ fontSize: 13, color: theme.textMuted, lineHeight: 1.7, margin: 0 }}>
                      {book.synopsis || book.short_description || book.plot_summary}
                    </p>
                  </div>
                )}

                {avail && (
                  <div style={{ ...styles.card, background: theme.surface, marginBottom: 20 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
                      <div>
                        <span style={{ fontSize: 13, color: theme.textMuted }}>Availability: </span>
                        <span style={{ fontWeight: 600, color: (avail.available_copies || 0) > 0 ? theme.success : theme.danger }}>
                          {avail.available_copies || 0} of {avail.total_copies || 0} copies available
                        </span>
                      </div>
                      {(avail.available_copies || 0) > 0 && (
                        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                          <input placeholder="User ID" value={borrowUserId}
                            onChange={(e) => setBorrowUserId(e.target.value)}
                            style={{ ...styles.inputField, width: 140, padding: "8px 12px" }} />
                          <button onClick={handleBorrow} disabled={actionLoading || !borrowUserId.trim()}
                            style={{ ...styles.btn("primary"), opacity: actionLoading || !borrowUserId.trim() ? 0.5 : 1 }}>
                            {actionLoading ? "..." : "Borrow"}
                          </button>
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {reviews.length > 0 && (
                  <div>
                    <div style={styles.label}>Reviews ({reviews.length})</div>
                    {reviews.slice(0, 5).map((r, i) => (
                      <div key={i} style={{ ...styles.card, background: theme.surface, padding: 14, marginBottom: 8 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                          <span style={{ fontSize: 12, color: theme.textMuted }}>{r.user_id || "Anonymous"}</span>
                          {r.rating && <Stars rating={r.rating} size={12} />}
                        </div>
                        {r.review_text && (
                          <p style={{ fontSize: 12, color: theme.textDim, lineHeight: 1.6, margin: 0 }}>
                            {r.review_text.slice(0, 300)}{r.review_text.length > 300 ? "..." : ""}
                          </p>
                        )}
                        {r.spoiler_flag && <span style={styles.badge(theme.danger)}>Spoiler</span>}
                      </div>
                    ))}
                  </div>
                )}
              </React.Fragment>
            )}
          </div>
        </div>
      );
    }

    // ─── SEARCH TAB ──────────────────────────────────────────────────────
    function SearchTab({ showToast }) {
      const [query, setQuery] = useState("");
      const [results, setResults] = useState(null);
      const [loading, setLoading] = useState(false);
      const [searchType, setSearchType] = useState("hybrid");
      const [selectedIsbn, setSelectedIsbn] = useState(null);

      const doSearch = async () => {
        if (!query.trim()) return;
        setLoading(true);
        try {
          const endpoint = searchType === "keyword" ? "/search/keyword" : searchType === "semantic" ? "/search/semantic" : "/search";
          const data = await api(`${endpoint}?q=${encodeURIComponent(query.trim())}&limit=20`);
          setResults(data);
        } catch (e) {
          showToast(e.message, "error");
        }
        setLoading(false);
      };

      return (
        <div>
          <div style={styles.searchWrap}>
            <span style={styles.searchIcon}>⌕</span>
            <input style={styles.searchInput}
              placeholder="Search by title, author, ISBN, or describe what you're looking for..."
              value={query}
              onChange={(e) => setQuery(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && doSearch()}
              onFocus={(e) => { e.target.style.borderColor = theme.accent + "60"; e.target.style.boxShadow = `0 0 0 3px ${theme.accentDim}`; }}
              onBlur={(e) => { e.target.style.borderColor = theme.cardBorder; e.target.style.boxShadow = "none"; }} />
          </div>

          <div style={{ display: "flex", gap: 8, marginBottom: 24, alignItems: "center" }}>
            {["hybrid", "keyword", "semantic"].map((t) => (
              <button key={t} onClick={() => setSearchType(t)}
                style={{ ...styles.btn(searchType === t ? "primary" : "outline"), padding: "6px 16px", fontSize: 12 }}>
                {t === "hybrid" ? "⚡ Hybrid" : t === "keyword" ? "🔤 BM25" : "🧠 Semantic"}
              </button>
            ))}
            <div style={{ flex: 1 }} />
            <button onClick={doSearch} disabled={loading || !query.trim()}
              style={{ ...styles.btn("primary"), opacity: loading || !query.trim() ? 0.5 : 1 }}>
              {loading ? "Searching..." : "Search"}
            </button>
          </div>

          {results && (
            <div style={{ marginBottom: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                <span style={{ fontSize: 13, color: theme.textMuted }}>
                  {results.total || 0} results for "<span style={{ color: theme.text }}>{results.query}</span>"
                </span>
                <div style={{ display: "flex", gap: 8 }}>
                  {results.query_type && <span style={styles.badge(theme.info)}>{results.query_type}</span>}
                  {results.weights && (
                    <span style={{ fontSize: 11, fontFamily: fontMono, color: theme.textDim }}>
                      K:{results.weights.keyword} M:{results.weights.metadata} R:{results.weights.review}
                    </span>
                  )}
                </div>
              </div>
              {results.reasoning && (
                <div style={{ fontSize: 12, color: theme.textDim, marginBottom: 16, fontStyle: "italic", padding: "8px 12px", background: theme.accentDim, borderRadius: 6 }}>
                  {results.reasoning}
                </div>
              )}
            </div>
          )}

          {loading ? <Loader text="Searching the catalog..." /> : results && results.results && results.results.length > 0 ? (
            results.results.map((book, i) => (
              <BookCard key={book.id || i} book={book} onSelect={(b) => setSelectedIsbn(b.isbn13)} />
            ))
          ) : results && results.total === 0 ? (
            <div style={styles.emptyState}>
              <div style={styles.emptyIcon}>🔍</div>
              <div style={{ fontSize: 15, color: theme.textMuted }}>No results found</div>
              <div style={{ fontSize: 12, color: theme.textDim, marginTop: 8 }}>Try a different query or search type</div>
            </div>
          ) : !results ? (
            <div style={styles.emptyState}>
              <div style={styles.emptyIcon}>📚</div>
              <div style={{ fontFamily: font, fontSize: 20, color: theme.textMuted }}>Search the Library</div>
              <div style={{ fontSize: 13, color: theme.textDim, marginTop: 8, maxWidth: 400, margin: "8px auto 0", lineHeight: 1.6 }}>
                Try "dark atmospheric fantasy", "books like Gone Girl", or an exact title.
                The hybrid search combines BM25 keywords, metadata vectors, and review embeddings via RRF.
              </div>
            </div>
          ) : null}

          {selectedIsbn && <BookDetail isbn13={selectedIsbn} onClose={() => setSelectedIsbn(null)} showToast={showToast} />}
        </div>
      );
    }

    // ─── RECOMMEND TAB (multi-turn librarian chat via POST /recommend/chat) ─
    function RecommendTab({ showToast }) {
      const [messages, setMessages] = useState([]);
      const [draft, setDraft] = useState("");
      const [loading, setLoading] = useState(false);
      const [selectedIsbn, setSelectedIsbn] = useState(null);
      const [lastBooks, setLastBooks] = useState([]);
      const endRef = useRef(null);

      useEffect(() => {
        endRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages, loading]);

      const clearChat = () => {
        setMessages([]);
        setLastBooks([]);
        setDraft("");
      };

      const sendMessage = async (forcedText = null) => {
        const text = (forcedText != null ? String(forcedText) : draft).trim();
        if (!text || loading) return;
        const prevTurns = messages.map((m) => ({ ...m }));
        const userMsg = { role: "user", content: text };
        const toSend = [...messages, userMsg];
        setMessages(toSend);
        setDraft("");
        setLoading(true);
        try {
          const data = await api("/recommend/chat", {
            method: "POST",
            body: JSON.stringify({ messages: toSend, limit: 5 }),
          });
          if (Array.isArray(data.messages)) setMessages(data.messages);
          if (Array.isArray(data.books)) setLastBooks(data.books);
          else setLastBooks([]);
        } catch (e) {
          setMessages(prevTurns);
          showToast(e.message, "error");
        }
        setLoading(false);
      };

      const bubbleWrap = (isUser) => ({
        display: "flex",
        justifyContent: isUser ? "flex-end" : "flex-start",
        marginBottom: 12,
      });

      const bubble = (isUser) => ({
        maxWidth: "85%",
        padding: "12px 16px",
        borderRadius: 14,
        fontSize: 14,
        lineHeight: 1.65,
        whiteSpace: "pre-wrap",
        border: `1px solid ${isUser ? theme.accent + "40" : theme.cardBorder}`,
        background: isUser
          ? `linear-gradient(135deg, ${theme.accentDim}, ${theme.surface})`
          : theme.card,
        color: theme.text,
        boxShadow: isUser ? `0 0 20px ${theme.accentGlow}` : "none",
      });

      return (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 16, marginBottom: 20, flexWrap: "wrap" }}>
            <div>
              <h2 style={{ fontFamily: font, fontSize: 22, fontWeight: 600, color: theme.text, margin: "0 0 8px" }}>
                💬 Librarian chat
              </h2>
              <p style={{ fontSize: 13, color: theme.textDim, margin: 0, lineHeight: 1.6, maxWidth: 640 }}>
                Talk in a loop like ChatGPT—the server re-searches the hybrid catalog each time you reply, grounds titles in excerpts, then Groq responds.
              </p>
            </div>
            <button type="button" onClick={clearChat} disabled={loading || messages.length === 0}
              style={{ ...styles.btn("outline"), opacity: messages.length === 0 ? 0.45 : 1 }}>
              Clear thread
            </button>
          </div>

          <div style={{
            ...styles.card,
            minHeight: 280,
            maxHeight: 440,
            overflowY: "auto",
            marginBottom: 16,
            background: theme.surface,
            padding: "16px 12px",
          }}>
            {messages.length === 0 && !loading ? (
              <div style={{ ...styles.emptyState, padding: "24px 8px", minHeight: 200 }}>
                <div style={styles.emptyIcon}>✨</div>
                <div style={{ fontFamily: font, fontSize: 18, color: theme.textMuted }}>Start a conversation</div>
                <div style={{ display: "flex", gap: 8, justifyContent: "center", marginTop: 16, flexWrap: "wrap" }}>
                  {[
                    "I want something cozy — maybe a bookstore mystery?",
                    "Dark literary fantasy, morally grey casts",
                    "Short audiobook-friendly nonfiction",
                    "What if I loved The Night Circus?",
                  ].map((s) => (
                    <button key={s} type="button" onClick={() => sendMessage(s)}
                      style={{ ...styles.btn("outline"), padding: "6px 14px", fontSize: 11, maxWidth: 280 }}>
                      {s}
                    </button>
                  ))}
                </div>
              </div>
            ) : (
              messages.map((m, i) => (
                <div key={i} style={bubbleWrap(m.role === "user")}>
                  <div style={bubble(m.role === "user")}>
                    <div style={{ fontSize: 10, fontFamily: fontMono, color: theme.textDim, marginBottom: 6, letterSpacing: "0.06em", textTransform: "uppercase" }}>
                      {m.role === "user" ? "You" : "Librarian"}
                    </div>
                    {m.content}
                  </div>
                </div>
              ))
            )}
            {loading && (
              <div style={{ display: "flex", alignItems: "center", gap: 10, color: theme.textMuted, padding: "8px 4px", fontSize: 13 }}>
                <span style={{ animation: "spin 1s linear infinite", display: "inline-block" }}>⟳</span>
                Searching the catalog & thinking…
              </div>
            )}
            <div ref={endRef} />
          </div>

          <div style={{ display: "flex", gap: 10, alignItems: "flex-end", marginBottom: lastBooks.length ? 20 : 0 }}>
            <textarea
              style={{
                flex: 1,
                minHeight: 72,
                maxHeight: 160,
                padding: "14px 16px",
                background: theme.surface,
                border: `1px solid ${theme.cardBorder}`,
                borderRadius: 8,
                color: theme.text,
                fontFamily: fontSans,
                fontSize: 14,
                resize: "vertical",
                outline: "none",
                boxSizing: "border-box",
              }}
              placeholder="Reply, refine (“shorter chapters?”), push back (“too grim”)… Enter sends, Shift+Enter newline."
              value={draft}
              onChange={(e) => setDraft(e.target.value)}
              onKeyDown={(e) => {
                if (e.key === "Enter" && !e.shiftKey) {
                  e.preventDefault();
                  sendMessage();
                }
              }}
              disabled={loading}
            />
            <button type="button" onClick={() => sendMessage()} disabled={loading || !draft.trim()}
              style={{ ...styles.btn("primary"), alignSelf: "stretch", opacity: loading || !draft.trim() ? 0.5 : 1 }}>
              {loading ? "…" : "Send"}
            </button>
          </div>

          {lastBooks.length > 0 && (
            <div>
              <div style={{ ...styles.label, marginBottom: 12 }}>
                Shelf snapshot this turn ({lastBooks.length})
              </div>
              <p style={{ fontSize: 12, color: theme.textDim, margin: "-4px 0 12px", lineHeight: 1.5 }}>
                Matches from hybrid search—the librarian’s prose may paraphrase, but excerpts come from here.
              </p>
              {lastBooks.map((book, i) => (
                <BookCard key={book.id || i} book={book} onSelect={(b) => setSelectedIsbn(b.isbn13)} />
              ))}
            </div>
          )}

          {selectedIsbn && <BookDetail isbn13={selectedIsbn} onClose={() => setSelectedIsbn(null)} showToast={showToast} />}
        </div>
      );
    }

    // ─── ANALYTICS TAB ───────────────────────────────────────────────────
    function AnalyticsTab({ showToast }) {
      const [stats, setStats] = useState(null);
      const [genres, setGenres] = useState([]);
      const [popular, setPopular] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        Promise.all([
          api("/analytics/stats").catch(() => null),
          api("/analytics/genres?limit=15").catch(() => []),
          api("/analytics/popular?limit=10").catch(() => []),
        ]).then(([s, g, p]) => {
          setStats(s);
          setGenres(g || []);
          setPopular(p || []);
          setLoading(false);
        });
      }, []);

      if (loading) return <Loader text="Loading analytics..." />;

      const bookStats = stats && stats.books ? stats.books : {};
      const reviewStats = stats && stats.reviews ? stats.reviews : {};
      const sources = stats && stats.sources ? stats.sources : {};
      const maxGenreCount = genres.length > 0 ? Math.max(...genres.map((g) => g.book_count)) : 1;

      return (
        <div>
          <h2 style={{ fontFamily: font, fontSize: 22, fontWeight: 600, color: theme.text, margin: "0 0 24px" }}>
            📊 Catalog Analytics
          </h2>

          <div style={{ display: "flex", gap: 14, marginBottom: 28, flexWrap: "wrap" }}>
            {[
              { value: bookStats.total_books ? bookStats.total_books.toLocaleString() : "—", label: "Total Books" },
              { value: bookStats.with_embeddings ? bookStats.with_embeddings.toLocaleString() : "—", label: "Embedded" },
              { value: bookStats.with_synopsis ? bookStats.with_synopsis.toLocaleString() : "—", label: "With Synopsis" },
              { value: bookStats.avg_rating || "—", label: "Avg Rating" },
              { value: reviewStats.total_reviews ? reviewStats.total_reviews.toLocaleString() : "—", label: "Reviews" },
            ].map((s, i) => (
              <div key={i} style={styles.statCard}>
                <div style={styles.statValue}>{s.value}</div>
                <div style={styles.statLabel}>{s.label}</div>
              </div>
            ))}
          </div>

          {Object.keys(sources).length > 0 && (
            <div style={{ ...styles.card, marginBottom: 20 }}>
              <div style={styles.label}>Data Sources</div>
              <div style={{ display: "flex", gap: 12, marginTop: 8, flexWrap: "wrap" }}>
                {Object.entries(sources).map(([src, count]) => (
                  <div key={src} style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={styles.badge(theme.accent)}>{src}</span>
                    <span style={{ fontSize: 12, color: theme.textMuted, fontFamily: fontMono }}>{count.toLocaleString()}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {genres.length > 0 && (
            <div style={{ ...styles.card, marginBottom: 20 }}>
              <div style={styles.label}>Top Genres</div>
              <div style={{ marginTop: 12 }}>
                {genres.map((g, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
                    <div style={{ width: 140, fontSize: 12, color: theme.textMuted, textAlign: "right", flexShrink: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                      {g.genre}
                    </div>
                    <div style={{ flex: 1, height: 20, background: theme.surface, borderRadius: 3, overflow: "hidden" }}>
                      <div style={{
                        height: "100%",
                        width: `${(g.book_count / maxGenreCount) * 100}%`,
                        background: `linear-gradient(90deg, ${theme.accent}40, ${theme.accent}80)`,
                        borderRadius: 3,
                        transition: "width 0.5s ease",
                      }} />
                    </div>
                    <span style={{ fontSize: 11, fontFamily: fontMono, color: theme.textDim, width: 50, textAlign: "right" }}>
                      {g.book_count.toLocaleString()}
                    </span>
                    {g.avg_rating && (
                      <span style={{ fontSize: 11, color: theme.accent, fontFamily: fontMono, width: 32 }}>
                        ★{g.avg_rating}
                      </span>
                    )}
                  </div>
                ))}
              </div>
            </div>
          )}

          {popular.length > 0 && (
            <div>
              <div style={styles.label}>Most Borrowed (30d)</div>
              {popular.map((b, i) => (
                <div key={i} style={{ ...styles.card, display: "flex", justifyContent: "space-between", alignItems: "center", padding: 14 }}>
                  <div>
                    <span style={{ fontFamily: font, fontSize: 15, color: theme.text }}>{b.title}</span>
                    <span style={{ fontSize: 12, color: theme.textMuted, marginLeft: 10 }}>{(b.authors || []).join(", ")}</span>
                  </div>
                  <span style={styles.badge(theme.success)}>{b.borrow_count} borrows</span>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ─── INVENTORY TAB ───────────────────────────────────────────────────
    function InventoryTab({ showToast }) {
      const [isbn, setIsbn] = useState("");
      const [availability, setAvailability] = useState(null);
      const [borrowId, setBorrowId] = useState("");
      const [returnLoading, setReturnLoading] = useState(false);
      const [renewLoading, setRenewLoading] = useState(false);

      const checkAvail = async () => {
        if (!isbn.trim()) return;
        try {
          const data = await api(`/availability/${isbn.trim()}`);
          setAvailability(data);
        } catch (e) {
          showToast(e.message, "error");
          setAvailability(null);
        }
      };

      const handleReturn = async () => {
        if (!borrowId.trim()) return;
        setReturnLoading(true);
        try {
          const res = await api("/return", { method: "POST", body: JSON.stringify({ borrow_id: parseInt(borrowId) }) });
          showToast(`Returned! (${res.return_date})`, "success");
          setBorrowId("");
        } catch (e) {
          showToast(e.message, "error");
        }
        setReturnLoading(false);
      };

      const handleRenew = async () => {
        if (!borrowId.trim()) return;
        setRenewLoading(true);
        try {
          const res = await api("/renew", { method: "POST", body: JSON.stringify({ borrow_id: parseInt(borrowId) }) });
          showToast(`Renewed! New due date: ${res.new_due_date} (${res.renewals_remaining} left)`, "success");
          setBorrowId("");
        } catch (e) {
          showToast(e.message, "error");
        }
        setRenewLoading(false);
      };

      return (
        <div>
          <h2 style={{ fontFamily: font, fontSize: 22, fontWeight: 600, color: theme.text, margin: "0 0 24px" }}>
            📦 Inventory Management
          </h2>

          <div style={{ ...styles.card, marginBottom: 20 }}>
            <div style={styles.label}>Check Availability</div>
            <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
              <input style={{ ...styles.inputField, flex: 1 }}
                placeholder="Enter ISBN-13..."
                value={isbn}
                onChange={(e) => setIsbn(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && checkAvail()} />
              <button onClick={checkAvail} style={styles.btn("primary")}>Check</button>
            </div>
            {availability && (
              <div style={{
                marginTop: 14, padding: 14, background: theme.surface, borderRadius: 6,
                border: `1px solid ${theme.cardBorder}`,
              }}>
                <div style={{ fontFamily: font, fontSize: 18, color: theme.text, marginBottom: 6 }}>
                  {availability.title || "Unknown Title"}
                </div>
                <div style={{ fontSize: 13, color: theme.textMuted, marginBottom: 10 }}>
                  {(availability.authors || []).join(", ")}
                </div>
                <div style={{ display: "flex", gap: 16 }}>
                  <div>
                    <span style={{ fontSize: 12, color: theme.textDim }}>Total copies: </span>
                    <span style={{ fontWeight: 600, color: theme.text }}>{availability.total_copies || 0}</span>
                  </div>
                  <div>
                    <span style={{ fontSize: 12, color: theme.textDim }}>Available: </span>
                    <span style={{ fontWeight: 600, color: (availability.available_copies || 0) > 0 ? theme.success : theme.danger }}>
                      {availability.available_copies || 0}
                    </span>
                  </div>
                </div>
              </div>
            )}
          </div>

          <div style={{ ...styles.card }}>
            <div style={styles.label}>Return or Renew a Book</div>
            <div style={{ display: "flex", gap: 10, marginTop: 8, flexWrap: "wrap" }}>
              <input style={{ ...styles.inputField, flex: 1, minWidth: 160 }}
                placeholder="Borrow ID..."
                value={borrowId}
                onChange={(e) => setBorrowId(e.target.value)}
                type="number" />
              <button onClick={handleReturn} disabled={returnLoading || !borrowId.trim()}
                style={{ ...styles.btn("primary"), opacity: returnLoading || !borrowId.trim() ? 0.5 : 1 }}>
                {returnLoading ? "..." : "Return"}
              </button>
              <button onClick={handleRenew} disabled={renewLoading || !borrowId.trim()}
                style={{ ...styles.btn("outline"), opacity: renewLoading || !borrowId.trim() ? 0.5 : 1 }}>
                {renewLoading ? "..." : "Renew"}
              </button>
            </div>
            <p style={{ fontSize: 12, color: theme.textDim, marginTop: 10, lineHeight: 1.5 }}>
              Max 2 renewals allowed · 14-day borrow period per cycle
            </p>
          </div>
        </div>
      );
    }

    // ─── APP ─────────────────────────────────────────────────────────────
    function App() {
      const [tab, setTab] = useState("search");
      const [toast, setToast] = useState(null);

      const showToast = useCallback((message, type = "info") => {
        setToast({ message, type });
      }, []);

      const tabs = [
        { id: "search", label: "Search" },
        { id: "recommend", label: "Recommend" },
        { id: "analytics", label: "Analytics" },
        { id: "inventory", label: "Inventory" },
      ];

      return (
        <div style={styles.app}>
          <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
          <style dangerouslySetInnerHTML={{ __html: `
            * { margin: 0; padding: 0; box-sizing: border-box; }
            @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
            ::placeholder { color: ${theme.textDim}; }
            ::-webkit-scrollbar { width: 6px; }
            ::-webkit-scrollbar-track { background: transparent; }
            ::-webkit-scrollbar-thumb { background: ${theme.cardBorder}; border-radius: 3px; }
            input:focus { border-color: ${theme.accent}60 !important; }
            button:hover:not(:disabled) { opacity: 0.85; }
          ` }} />

          <header style={styles.header}>
            <h1 style={styles.logo}>The Library</h1>
            <div style={styles.subtitle}>Hybrid RAG Search · BM25 + pgvector + RRF</div>
            <nav style={styles.nav}>
              {tabs.map((t) => (
                <button key={t.id} onClick={() => setTab(t.id)} style={styles.navItem(tab === t.id)}>
                  {t.label}
                </button>
              ))}
            </nav>
          </header>

          <main style={styles.main}>
            {tab === "search" && <SearchTab showToast={showToast} />}
            {tab === "recommend" && <RecommendTab showToast={showToast} />}
            {tab === "analytics" && <AnalyticsTab showToast={showToast} />}
            {tab === "inventory" && <InventoryTab showToast={showToast} />}
          </main>

          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
        </div>
      );
    }

    // ─── RENDER ──────────────────────────────────────────────────────────
    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
